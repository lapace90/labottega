networks:
  bottega-backend:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bottegaApp
    ports:
      - "8001:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bottega-backend
    env_file:
      - .env
    command: >
      sh -c "
        php artisan --verbose migrate --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  db:
    image: postgres:17
    container_name: bottegaDb
    ports:
      - "127.0.0.1:5434:5432"
    volumes:
      - bottega_postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - bottega-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bottega_postgres_data:
    driver: local
